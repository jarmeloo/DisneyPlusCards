<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards Disney+</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="item">
            <div class="item__border">
                <img class="item__image"
                    src="assets/disney_logo.webp">
                <video class="item__image hover-image" autoplay muted loop>
                    <source src="assets/disney.mp4" type="video/mp4">
                </video>
            </div>
        </div>

        <div class="item">
            <div class="item__border">
                <img class="item__image"
                    src="assets/pixar_logo.webp">
                <video class="item__image hover-image" autoplay muted loop>
                    <source src="assets/pixar.mp4" type="video/mp4">
                </video>
            </div>
        </div>

        <div class="item">
            <div class="item__border">
                <img class="item__image"
                    src="assets/marvel_logo.webp">
                <video class="item__image hover-image" autoplay muted loop>
                    <source src="assets/marvel.mp4" type="video/mp4">
                </video>
            </div>
        </div>

        <div class="item">
            <div class="item__border">
                <img class="item__image"
                    src="assets/starWars_logo.webp">
                <video class="item__image hover-image" autoplay muted loop>
                    <source src="assets/star-wars.mp4" type="video/mp4">
                </video>
            </div>
        </div>

        <div class="item">
            <div class="item__border">
                <img class="item__image"
                    src="assets/netGeo_logo.webp">
                <video class="item__image hover-image" autoplay muted loop>
                    <source src="assets/netgeo.mp4" type="video/mp4">
                </video>
            </div>
        </div>

    </div>

</body>

</html>
